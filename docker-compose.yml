services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
      MYSQL_USER: ${MYSQL_USER:-ecommerce}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6380:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ecommerce-api
    env_file: .env
    environment:
      DB_HOST: mysql
      MONGO_URI: mongodb://mongo:27017/ecommerce
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  customer-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.customer-web
    container_name: ecommerce-customer-web
    ports:
      - "5173:80"
    depends_on:
      - api

  admin-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin-web
    container_name: ecommerce-admin-web
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  mysql_data:
  mongo_data:
